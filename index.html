<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>BASEBALL SCORESHEET - V6.3</title>
<style>
#version-stamp {
    background: #000; color: #ff00ff; padding: 8px 15px; 
    font-family: monospace; font-size: 14px; border-radius: 5px;
    margin: 10px; display: inline-block; font-weight: bold;
}

body {
    background-color: #e8e4da;
    background-image: url('https://www.photos-public-domain.com/wp-content/uploads/2012/05/white-paper-texture.jpg');
    background-size: cover; margin: 0; padding: 10px; font-family: Arial, sans-serif;
}

.scroll-container {
    width: 100%; overflow-x: auto; border: 2px solid #666;
    background: rgba(255,255,255,0.3); margin-bottom: 20px;
    padding: 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch;
}

input {
    text-align: center !important; border: none; outline: none; background: transparent;
    width: 100%; height: 100%; padding: 0 !important; margin: 0 !important;
    display: block !important; -webkit-appearance: none; border-radius: 0;
}

/* TEAM NAME - SIMPLIFIED CENTERING */
.team-header-input { 
    text-align: center !important; 
    text-align-last: center !important; /* The Safari "Hammer" */
    font-size: 18px !important; 
    font-weight: bold !important; 
    text-transform: uppercase !important;
    width: 100% !important;
    margin: 0 auto !important;
    display: block !important;
    -webkit-appearance: none;
}

.col-3 input { text-align: left !important; padding-left: 8px !important; }
.inning-input { font-weight: bold; font-size: 18px; text-align: center !important;}

/* BATTING GRID */
.grid {
    display: grid; grid-template-columns: 32px 32px 150px repeat(12, 44px);
    grid-template-rows: repeat(13, 48px); gap: 4px; width: 755px; margin-bottom: 40px;
}

.cell {
    background: white; border: 1px solid #ccc; display: flex; flex-direction: column;
    justify-content: center; align-items: stretch; cursor: pointer; position: relative;
    overflow: hidden; box-sizing: border-box;
}

.dual-input { height: 50% !important; z-index: 5; }
.border-mid { border-bottom: 1px solid #bbb !important; }
.hidden-cell { visibility: hidden !important; border: none !important; }

.diagonal-slash { background-color: #f2f2f2 !important; }
.mini-canvas { position: absolute; right: 0; top: 0; width: 44px !important; height: 48px !important; pointer-events: none; z-index: 10; }

/* PITCHING GRID */
.pitching-wrapper { display: flex; gap: 40px; width: fit-content; }
.p-grid {
    display: grid;
    grid-template-columns: 30px 180px 45px 55px repeat(6, 30px);
    background: #333; border: 2px solid #333; width: fit-content;
}

.p-header-main { grid-column: span 10; background: #ddd; height: 40px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center;}
.p-label { background: #eee; font-weight: bold; font-size: 11px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; height: 30px;}
.p-input-cell { background: white; border: 1px solid #333; height: 35px; }
.p-name-input { text-align: left !important; padding-left: 8px !important; font-weight: bold; }

/* POPUPS */
#drawing-popup { 
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    background: white; border: 4px solid black; padding: 20px; z-index: 1000; box-shadow: 0 0 80px rgba(0,0,0,0.8);
}
#drawing-popup canvas { border: 2px solid #000; background: #fff; touch-action: none; width: 400px; height: 400px; }
.popup-btn { padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; border: 1px solid #444; }
#position-popup { display: none; position: fixed; background: white; border: 3px solid black; z-index: 2000; padding: 15px; grid-template-columns: repeat(3, 1fr); gap: 10px; }
#position-popup button { padding: 20px; font-size: 20px; font-weight: bold; cursor: pointer; }
.ph-border { border-left: 6px solid black !important; }
.rp-border { border-top: 6px solid black !important; }
</style>
</head>
<body>


    
    <!--
    <div id="version-stamp">V6.3bb </div>   <!-- VERSION NUMBER AT TOP OF PAGE - USED FOR TROUBLESHOOTING -->
    -->

    

<div class="scroll-container">
    <div class="grid" id="grid1"></div>
    <div class="grid" id="grid2"></div>
</div>

<div class="scroll-container">
    <div class="pitching-wrapper">
        <div class="p-grid" id="p-grid1">
            <div class="p-header-main" id="team1-label">VISITOR</div>
            <div class="p-label">T</div><div class="p-label">NAME</div><div class="p-label">DEC</div><div class="p-label">IP</div>
            <div class="p-label">H</div><div class="p-label">R</div><div class="p-label">ER</div><div class="p-label">K</div><div class="p-label">BB</div><div class="p-label">HR</div>
        </div>
        <div class="p-grid" id="p-grid2">
            <div class="p-header-main" id="team2-label">HOME</div>
            <div class="p-label">T</div><div class="p-label">NAME</div><div class="p-label">DEC</div><div class="p-label">IP</div>
            <div class="p-label">H</div><div class="p-label">R</div><div class="p-label">ER</div><div class="p-label">K</div><div class="p-label">BB</div><div class="p-label">HR</div>
        </div>
    </div>
</div>

<div style="margin: 20px; display: flex; gap: 15px;">
    <button id="clear-all-btn" style="background: #cc0000; color: white; width: 150px; border:none; height:55px; cursor:pointer; font-weight:bold; border-radius:8px;">CLEAR ALL</button>
    <input type="text" id="bg-url" placeholder="Paste Background URL" style="width: 350px; padding: 15px; text-align: left !important; background:white; border: 1px solid #ccc;">
    <button id="update-bg" style="padding: 15px 25px; cursor: pointer; font-weight:bold; background:#ddd; border: 1px solid #999;">Update BG</button>
</div>

<div id="drawing-popup">
  <canvas id="popup-canvas" width="400" height="400"></canvas>
  <div style="display:flex; flex-direction:column; gap:12px; margin-top:15px;">
    <div style="display:flex; gap:8px;">
      <button id="black-btn" class="popup-btn" style="background:black; color:white; flex:1;">BLACK</button>
      <button id="red-btn" class="popup-btn" style="background:red; color:white; flex:1;">RED</button>
      <button id="end-btn" class="popup-btn" style="background:darkgray; color:white; flex:1;">END</button>
      <button id="ph-btn" class="popup-btn" style="flex:1;">PH</button>
      <button id="rp-btn" class="popup-btn" style="flex:1;">RP</button>
    </div>
    <div style="display:flex; gap:8px;">
        <button id="clear-btn" class="popup-btn" style="background:orange; color:white; flex:1;">CLEAR</button>
        <button id="ok-btn" class="popup-btn" style="background:green; color:white; flex:2; font-size:20px;">OK</button>
    </div>
  </div>
</div>
<div id="position-popup"></div>

<script>
const positions = ["CA","1B","2B","3B","SS","LF","CF","RF","DH","PH"," "];
const cellDrawings = new Map();
let currentCell = null, brushColor = 'black', drawing = false, lastX=0, lastY=0;
const canvas = document.getElementById('popup-canvas'), ctx = canvas.getContext('2d');

function drawSlash(context, w, h) {
    context.strokeStyle = '#bbb'; context.lineWidth = 1;
    context.beginPath(); context.moveTo(0, h); context.lineTo(w, 0); context.stroke();
}

function refreshPopup() {
    ctx.clearRect(0,0,400,400);
    if(currentCell && currentCell.classList.contains('diagonal-slash')) drawSlash(ctx, 400, 400);
    const savedData = cellDrawings.get(currentCell);
    if(savedData){ const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, 400, 400); img.src = savedData; }
}

function createGrid(gridElement){
  for(let r=1;r<=13;r++){
    for(let c=1;c<=15;c++){
      const cell = document.createElement('div');
      cell.classList.add('cell', `row-${r}`, `col-${c}`);
      
      if(r===1 && c<3) {
          cell.classList.add('hidden-cell');
      } else if(r===1 && c>=3){
        const inp = document.createElement('input'); 
        inp.classList.add(c===3 ? 'team-header-input' : 'inning-input');
        if(c>3 && c<=12) inp.value = c-3;
        if(c===3) {
            inp.placeholder = "TEAM";
            inp.oninput = () => {
                const label = document.getElementById(gridElement.id === 'grid1' ? 'team1-label' : 'team2-label');
                label.textContent = inp.value.toUpperCase() || (gridElement.id === 'grid1' ? "VISITOR" : "HOME");
                saveData();
            };
        }
        cell.appendChild(inp);
      }
      else if((c===1 || c===2 || c===3) && r!==1){
        const t = document.createElement('input'); t.classList.add('dual-input', 'border-mid');
        const b = document.createElement('input'); b.classList.add('dual-input');
        t.oninput = saveData; b.oninput = saveData;
        if(c===1) {
            [t, b].forEach(inp => {
                inp.readOnly = true; inp.onclick = (e) => {
                    e.stopPropagation(); const p = document.getElementById('position-popup');
                    p.style.display = 'grid'; p.style.top = '25%'; p.style.left = '50%'; p.style.transform = 'translateX(-50%)';
                    p.innerHTML = ''; positions.forEach(pos => {
                        const btn = document.createElement('button'); btn.textContent = pos;
                        btn.onclick = () => { inp.value = pos; p.style.display='none'; saveData(); };
                        p.appendChild(btn);
                    });
                };
            });
        }
        cell.appendChild(t); cell.appendChild(b);
      }
      
      if(r===13 && c>=4) {
          cell.classList.add('diagonal-slash');
          const mini = document.createElement('canvas');
          mini.className = 'mini-canvas'; mini.width = 44; mini.height = 48;
          drawSlash(mini.getContext('2d'), 44, 48);
          cell.appendChild(mini);
      }

      if(c>2 && !(r===1 && c>=3)){
        cell.onclick = () => { currentCell = cell; document.getElementById('drawing-popup').style.display='block'; brushColor='black'; refreshPopup(); };
      }
      gridElement.appendChild(cell);
    }
  }
}

function createPitchingGrid(containerId) {
    const grid = document.getElementById(containerId);
    for(let i=0; i<8; i++) {
        for(let j=0; j<10; j++) {
            const div = document.createElement('div');
            div.className = 'p-input-cell';
            const input = document.createElement('input');
            if(j === 1) input.classList.add('p-name-input');
            if(j >= 3) input.setAttribute('inputmode', 'decimal'); 
            if(j === 3) {
                input.onblur = () => { let val = input.value; if(val && !isNaN(val) && !val.includes('.')) input.value = val + ".0"; saveData(); };
            }
            input.oninput = saveData; div.appendChild(input); grid.appendChild(div);
        }
    }
}

// Drawing Logic
const getCoords = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return [(clientX - rect.left) * (400 / rect.width), (clientY - rect.top) * (400 / rect.height)];
};
const startDraw = (e) => { e.preventDefault(); drawing=true; [lastX, lastY] = getCoords(e); };
const moveDraw = (e) => { if(!drawing) return; e.preventDefault(); const [x,y]=getCoords(e); ctx.strokeStyle=brushColor; ctx.lineWidth=24; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); [lastX,lastY]=[x,y]; };
const stopDraw = () => drawing = false;
canvas.addEventListener('touchstart', startDraw, {passive: false}); canvas.addEventListener('touchmove', moveDraw, {passive: false}); canvas.addEventListener('touchend', stopDraw);

document.getElementById('black-btn').onclick = () => brushColor='black';
document.getElementById('red-btn').onclick = () => brushColor='red';
document.getElementById('clear-btn').onclick = () => { cellDrawings.delete(currentCell); refreshPopup(); };
document.getElementById('ph-btn').onclick = (e) => { e.stopPropagation(); currentCell.classList.toggle('ph-border'); saveData(); };
document.getElementById('rp-btn').onclick = (e) => { e.stopPropagation(); currentCell.classList.toggle('rp-border'); saveData(); };
document.getElementById('end-btn').onclick = () => { ctx.strokeStyle = '#444'; ctx.lineWidth = 14; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(400,400); ctx.stroke(); ctx.beginPath(); ctx.moveTo(400,0); ctx.lineTo(0,400); ctx.stroke(); };

document.getElementById('ok-btn').onclick = () => { 
    if(!currentCell) return; 
    const finalData = canvas.toDataURL(); 
    cellDrawings.set(currentCell, finalData); 
    let mini = currentCell.querySelector('.mini-canvas') || document.createElement('canvas');
    if(!mini.className) { mini.className = 'mini-canvas'; mini.width = 44; mini.height = 48; currentCell.appendChild(mini); }
    const mCtx = mini.getContext('2d'); 
    const img = new Image(); 
    img.onload = () => { 
        mCtx.clearRect(0,0,44,48); 
        if(currentCell.classList.contains('diagonal-slash')) drawSlash(mCtx, 44, 48);
        mCtx.drawImage(img, 0, 0, 44, 48); 
        saveData(); 
        document.getElementById('drawing-popup').style.display = 'none';
        currentCell = null;
    }; 
    img.src = finalData; 
};

document.getElementById('clear-all-btn').onclick = () => { if(confirm("Wipe sheet?")) { localStorage.clear(); location.reload(); } };
document.getElementById('update-bg').onclick = () => { document.body.style.backgroundImage = `url('${document.getElementById('bg-url').value}')`; saveData(); };

function saveData(){
  const data = { grid1: [], grid2: [], pitch: [], bg: document.getElementById('bg-url').value };
  const getCellData = (cell) => ({ v: [...cell.querySelectorAll('input')].map(inp=>inp.value), d: cellDrawings.get(cell) || null, b: { ph: cell.classList.contains('ph-border'), rp: cell.classList.contains('rp-border') } });
  document.querySelectorAll('#grid1 .cell').forEach(c => data.grid1.push(getCellData(c)));
  document.querySelectorAll('#grid2 .cell').forEach(c => data.grid2.push(getCellData(c)));
  document.querySelectorAll('.p-input-cell input').forEach(i => data.pitch.push(i.value));
  localStorage.setItem('scoresheetV6_3', JSON.stringify(data));
}
function loadData(){
  const saved = JSON.parse(localStorage.getItem('scoresheetV6_3') || '{}');
  if(saved.bg) { document.getElementById('bg-url').value = saved.bg; document.body.style.backgroundImage = `url('${saved.bg}')`; }
  const applyData = (cells, savedList) => {
    if(!savedList) return;
    cells.forEach((cell, i) => {
        const item = savedList[i]; if(!item) return;
        const inputs = cell.querySelectorAll('input');
        item.v.forEach((val, idx) => { if(inputs[idx]) inputs[idx].value = val; });
        if(item.b?.ph) cell.classList.add('ph-border');
        if(item.b?.rp) cell.classList.add('rp-border');
        if(item.d) { 
            cellDrawings.set(cell, item.d); 
            let mini = cell.querySelector('.mini-canvas') || document.createElement('canvas');
            if(!mini.className) { mini.className = 'mini-canvas'; mini.width = 44; mini.height = 48; cell.appendChild(mini); }
            const mCtx = mini.getContext('2d'); 
            const img = new Image(); 
            img.onload = function() { 
                mCtx.clearRect(0,0,44,48);
                if(cell.classList.contains('diagonal-slash')) drawSlash(mCtx, 44, 48);
                mCtx.drawImage(this, 0, 0, 44, 48); 
            }; 
            img.src = item.d; 
        }
    });
  };
  applyData(document.querySelectorAll('#grid1 .cell'), saved.grid1);
  applyData(document.querySelectorAll('#grid2 .cell'), saved.grid2);
  const pInputs = document.querySelectorAll('.p-input-cell input');
  saved.pitch?.forEach((val, i) => { if(pInputs[i]) pInputs[i].value = val; });
}

createGrid(document.getElementById('grid1')); createGrid(document.getElementById('grid2'));
createPitchingGrid('p-grid1'); createPitchingGrid('p-grid2'); loadData();
</script>
</body>
</html>
